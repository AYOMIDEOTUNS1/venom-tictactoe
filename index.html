<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VENOM Tic Tac Toe</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🎮 VENOM TIC TAC TOE</h1>
<p class="subtitle">Challenge a friend or battle the AI.</p>

<div class="players">

<input type="text" id="playerX" placeholder="Player X Name">

<input type="text" id="playerO" placeholder="Player O / AI Name" value="AI">

</div>

<div class="controls">

<select id="mode">
<option value="ai">Player vs AI</option>
<option value="pvp">Player vs Player</option>
</select>

<select id="difficulty">
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
<option value="impossible">Impossible</option>
</select>

<button id="restart">Restart</button>
<button id="undo">Undo</button>

</div>

<div class="scoreboard">

<div>
<h3 id="nameX">Player X</h3>
<span id="scoreX">0</span>
</div>

<div>
<h3>Draw</h3>
<span id="drawScore">0</span>
</div>

<div>
<h3 id="nameO">AI</h3>
<span id="scoreO">0</span>
</div>

</div>

<h2 id="status">Player X Turn</h2>

<div class="board">

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

<div class="cell"></div>
<div class="cell"></div>
<div class="cell"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
