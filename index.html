<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VENOM Tic Tac Toe</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🎮 VENOM TIC TAC TOE</h1>
    <p class="subtitle">Play against the AI or challenge a friend.</p>

    <div class="controls">
        <button>Restart</button>
        <button>Undo</button>

        <select>
            <option>Easy</option>
            <option>Medium</option>
            <option selected>Hard</option>
            <option>Impossible</option>
        </select>
    </div>

    <div class="board">

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
